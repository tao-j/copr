# Don't touch this file otherwise your device may stop working.
# Use override.yaml to modify required settings.
# You can find a working configuration in /usr/share/kvmd/configs.default/kvmd.

kvmd:
    hid:
        type: serial
        keyboard:
            device: /dev/null
        mouse:
            device: /dev/null
        mouse_alt:
            device: /dev/null
        noop: true

    gpio:
        type: disabled

    atx:
        type: disabled

    msd:
        type: disabled

    ocr:
        tessdata: /usr/share/tesseract/tessdata/

    info:
        hw:
            vcgencmd_cmd: ["/usr/bin/kvmd-fake-vcgencmd"]
    streamer:
        cmd:
            - "/usr/bin/ustreamer"
            - "--device=/dev/video0"
            - "--persistent"
            - "--desired-fps={desired_fps}"
            - "--drop-same-frames=30"
            - "--last-as-blank=0"
            - "--unix={unix}"
            - "--unix-rm"
            - "--unix-mode=0660"
            - "--exit-on-parent-death"
            - "--process-name-prefix={process_name_prefix}"
            - "--notify-parent"
            - "--no-log-colors"
            - "--sink=kvmd::ustreamer::jpeg"
            - "--sink-mode=0660"
            - "--resolution=1920x1080"


vnc:
    memsink:
        jpeg:
            sink: "kvmd::ustreamer::jpeg"